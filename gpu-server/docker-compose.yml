# HeartCode GPU Server - PEA Configuration
# 8x NVIDIA P104-100 (8GB each), 32GB RAM, 2-core Celeron
#
# Layout (1-indexed GPU numbering):
#   GPU 1-3: SFW Chat (Stheno v3.4 Q5_K_M) + text Embeddings
#   GPU 4-6: NSFW Chat (Lumimaid v0.2 8B Q5_K_M) + text Embeddings
#   GPU 7:   Vision Embeddings (nomic-embed-vision-v1.5 + nomic-embed-text-v1.5) — dedicated
#   GPU 8:   Image generation (Segmind SSD-1B via LocalAI)
#
# GPU UUIDs (from nvidia-smi -L):
#   GPU 0: GPU-76bfe17d-b576-ee20-f8b7-c70b767a20b8
#   GPU 1: GPU-f1fa6009-d240-3810-d6ca-4c65ecc22dcf
#   GPU 2: GPU-1f2ba781-081b-56cf-da1a-802759aea70b
#   GPU 3: GPU-48054f5b-0660-6e89-ec5b-9ac85db7b7b1
#   GPU 4: GPU-d8525241-21cb-a127-b4d8-d72b9ac32b1b
#   GPU 5: GPU-fe0fc635-7c25-49b8-866e-3e4f9ce7efc9
#   GPU 6: GPU-f417c539-26db-94e9-4c8f-c5a775291988
#   GPU 7: GPU-c710b68a-493d-0d55-9b1a-f48d8ad71978
#
# Context: 16K tokens (N_CTX=16384) — uses ~1GB KV cache at q8_0
# VRAM budget: ~5.7GB model + ~1GB KV + ~0.35GB embed + ~0.55GB overhead = ~7.6GB / 8GB
#
# Memory Budget (32GB total):
#   - 6x chat containers: 2GB each = 12GB max
#   - 6x text-embed containers: 768MB each = 4.5GB max
#   - 1x vision-embed container: 4GB max (PyTorch + nomic ViT/BERT pair, ~1.1GB used)
#   - 1x image container: 4GB max
#   - Note: mem_limit is per-container max, not reserved. Actual use much lower.
#   - Swap available for spikes
#
# Usage:
#   docker compose up -d
#   docker compose logs -f

x-gpu-server-common: &gpu-server-common
  image: local-ai-llama:latest
  restart: unless-stopped
  volumes:
    - ./models:/models:ro
    - ./configs:/app/configs:ro
    - ./server.py:/app/server.py:ro
    - ./metrics.py:/app/metrics.py:ro
    - ./routes.py:/app/routes.py:ro
    - ./llama_client.py:/app/llama_client.py:ro
    - ./config.py:/app/config.py:ro
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    interval: 15s
    timeout: 5s
    retries: 2
    start_period: 300s
  networks:
    - gpu-network
  mem_limit: 2048m
  memswap_limit: 3072m

x-gpu-env-common: &gpu-env-common
  N_GPU_LAYERS: 33
  N_CTX: 16384
  N_BATCH: 128
  N_UBATCH: 64
  N_THREADS: 2
  CACHE_REUSE: 256
  CACHE_TYPE_K: q8_0
  CACHE_TYPE_V: q8_0
  EXTRA_ARGS: "--jinja"
  PORT: 8080

x-embedding-server-common: &embedding-server-common
  image: local-ai-llama:latest
  restart: unless-stopped
  volumes:
    - ./models:/models:ro
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
    interval: 15s
    timeout: 5s
    retries: 2
    start_period: 60s
  networks:
    - gpu-network
  mem_limit: 768m
  memswap_limit: 1024m
  entrypoint: ["llama-server"]
  command:
    - "--model"
    - "/models/nomic-embed-text-v1.5.Q8_0.gguf"
    - "--port"
    - "8090"
    - "--host"
    - "0.0.0.0"
    - "--embedding"
    - "--ctx-size"
    - "2048"
    - "--batch-size"
    - "512"
    - "--n-gpu-layers"
    - "99"
    - "--cache-type-k"
    - "q8_0"
    - "--cache-type-v"
    - "q8_0"

services:
  # =============================================================================
  # SFW CHAT SERVERS (GPU 1-3)
  # =============================================================================

  gpu-server-1:
    <<: *gpu-server-common
    container_name: pea-gpu-1
    runtime: nvidia
    environment:
      <<: *gpu-env-common
      NVIDIA_VISIBLE_DEVICES: GPU-76bfe17d-b576-ee20-f8b7-c70b767a20b8
      SERVER_ID: gpu-1
      MODEL_PATH: ${GPU_1_MODEL_PATH:-/models/model.gguf}
      MODEL_TYPE: ${GPU_1_MODEL_TYPE:-sfw}
      MODEL_NAME: ${GPU_1_MODEL_NAME:-unknown}
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-76bfe17d-b576-ee20-f8b7-c70b767a20b8']
              capabilities: [gpu]

  gpu-server-2:
    <<: *gpu-server-common
    container_name: pea-gpu-2
    runtime: nvidia
    environment:
      <<: *gpu-env-common
      NVIDIA_VISIBLE_DEVICES: GPU-f1fa6009-d240-3810-d6ca-4c65ecc22dcf
      SERVER_ID: gpu-2
      MODEL_PATH: ${GPU_2_MODEL_PATH:-/models/model.gguf}
      MODEL_TYPE: ${GPU_2_MODEL_TYPE:-sfw}
      MODEL_NAME: ${GPU_2_MODEL_NAME:-unknown}
    ports:
      - "8081:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-f1fa6009-d240-3810-d6ca-4c65ecc22dcf']
              capabilities: [gpu]

  gpu-server-3:
    <<: *gpu-server-common
    container_name: pea-gpu-3
    runtime: nvidia
    environment:
      <<: *gpu-env-common
      NVIDIA_VISIBLE_DEVICES: GPU-1f2ba781-081b-56cf-da1a-802759aea70b
      SERVER_ID: gpu-3
      MODEL_PATH: ${GPU_3_MODEL_PATH:-/models/model.gguf}
      MODEL_TYPE: ${GPU_3_MODEL_TYPE:-sfw}
      MODEL_NAME: ${GPU_3_MODEL_NAME:-unknown}
    ports:
      - "8082:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-1f2ba781-081b-56cf-da1a-802759aea70b']
              capabilities: [gpu]

  # =============================================================================
  # NSFW CHAT SERVERS (GPU 4-7)
  # =============================================================================

  gpu-server-4:
    <<: *gpu-server-common
    container_name: pea-gpu-4
    runtime: nvidia
    environment:
      <<: *gpu-env-common
      NVIDIA_VISIBLE_DEVICES: GPU-48054f5b-0660-6e89-ec5b-9ac85db7b7b1
      SERVER_ID: gpu-4
      MODEL_PATH: ${GPU_4_MODEL_PATH:-/models/model.gguf}
      MODEL_TYPE: ${GPU_4_MODEL_TYPE:-nsfw}
      MODEL_NAME: ${GPU_4_MODEL_NAME:-unknown}
    ports:
      - "8083:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-48054f5b-0660-6e89-ec5b-9ac85db7b7b1']
              capabilities: [gpu]

  gpu-server-5:
    <<: *gpu-server-common
    container_name: pea-gpu-5
    runtime: nvidia
    environment:
      <<: *gpu-env-common
      NVIDIA_VISIBLE_DEVICES: GPU-d8525241-21cb-a127-b4d8-d72b9ac32b1b
      SERVER_ID: gpu-5
      MODEL_PATH: ${GPU_5_MODEL_PATH:-/models/model.gguf}
      MODEL_TYPE: ${GPU_5_MODEL_TYPE:-nsfw}
      MODEL_NAME: ${GPU_5_MODEL_NAME:-unknown}
    ports:
      - "8084:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-d8525241-21cb-a127-b4d8-d72b9ac32b1b']
              capabilities: [gpu]

  gpu-server-6:
    <<: *gpu-server-common
    container_name: pea-gpu-6
    runtime: nvidia
    environment:
      <<: *gpu-env-common
      NVIDIA_VISIBLE_DEVICES: GPU-fe0fc635-7c25-49b8-866e-3e4f9ce7efc9
      SERVER_ID: gpu-6
      MODEL_PATH: ${GPU_6_MODEL_PATH:-/models/model.gguf}
      MODEL_TYPE: ${GPU_6_MODEL_TYPE:-nsfw}
      MODEL_NAME: ${GPU_6_MODEL_NAME:-unknown}
    ports:
      - "8085:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-fe0fc635-7c25-49b8-866e-3e4f9ce7efc9']
              capabilities: [gpu]

  # gpu-server-7 (NSFW, GPU-f417c539 / 1-indexed GPU 7) was REASSIGNED to the
  # multimodal-embed service (see "MULTIMODAL EMBEDDING SERVER" below). A 3B
  # multimodal model needs a dedicated 8GB card and cannot co-locate with an 8B
  # chat model. NSFW chat is now GPU 4-6 (3 GPUs). To roll back, restore this
  # service and embedding-server-7 from git and stop multimodal-embed.

  # =============================================================================
  # EMBEDDING SERVERS (GPU 1-6, co-located with chat servers)
  # Old text-only tier (nomic-embed-text-v1.5). Kept up for rollback during the
  # multimodal cutover; embedding-server-7 was removed (its GPU is now dedicated
  # to multimodal-embed). Decommissioned in change task 7.2 after re-indexing.
  # =============================================================================

  embedding-server-1:
    <<: *embedding-server-common
    container_name: pea-embed-1
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-76bfe17d-b576-ee20-f8b7-c70b767a20b8
    ports:
      - "8090:8090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-76bfe17d-b576-ee20-f8b7-c70b767a20b8']
              capabilities: [gpu]

  embedding-server-2:
    <<: *embedding-server-common
    container_name: pea-embed-2
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-f1fa6009-d240-3810-d6ca-4c65ecc22dcf
    ports:
      - "8091:8090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-f1fa6009-d240-3810-d6ca-4c65ecc22dcf']
              capabilities: [gpu]

  embedding-server-3:
    <<: *embedding-server-common
    container_name: pea-embed-3
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-1f2ba781-081b-56cf-da1a-802759aea70b
    ports:
      - "8092:8090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-1f2ba781-081b-56cf-da1a-802759aea70b']
              capabilities: [gpu]

  embedding-server-4:
    <<: *embedding-server-common
    container_name: pea-embed-4
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-48054f5b-0660-6e89-ec5b-9ac85db7b7b1
    ports:
      - "8093:8090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-48054f5b-0660-6e89-ec5b-9ac85db7b7b1']
              capabilities: [gpu]

  embedding-server-5:
    <<: *embedding-server-common
    container_name: pea-embed-5
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-d8525241-21cb-a127-b4d8-d72b9ac32b1b
    ports:
      - "8094:8090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-d8525241-21cb-a127-b4d8-d72b9ac32b1b']
              capabilities: [gpu]

  embedding-server-6:
    <<: *embedding-server-common
    container_name: pea-embed-6
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-fe0fc635-7c25-49b8-866e-3e4f9ce7efc9
    ports:
      - "8095:8090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-fe0fc635-7c25-49b8-866e-3e4f9ce7efc9']
              capabilities: [gpu]

  # =============================================================================
  # VISION EMBEDDING SERVER (dedicated GPU-f417c539 / 1-indexed GPU 7)
  # nomic-embed-vision-v1.5 (images) + nomic-embed-text-v1.5 (text) — natural-
  # photo embeddings in one shared 768-d space, behind heartcode-embed-vision
  # (openspec change serve-photo-embeddings). REPLACES BiQwen2.5 on GPU 7.
  # Verified on hardware 2026-05-28: fp32, dim 768, ~1.1GB VRAM.
  # =============================================================================

  vision-embed:
    image: local-ai-vision-embed:latest
    build:
      context: ./vision-embed
      dockerfile: Dockerfile
    container_name: pea-embed-vision-1
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-f417c539-26db-94e9-4c8f-c5a775291988
      SERVER_ID: embed-vision-1
      PORT: 8080
      METRICS_PORT: 9091
      PRECISION: float32          # Pascal: small ViT/BERT towers run fine in fp32
      VISION_MODEL_ID: nomic-ai/nomic-embed-vision-v1.5
      TEXT_MODEL_ID: nomic-ai/nomic-embed-text-v1.5
      HF_HOME: /models
      HF_HUB_CACHE: /models
    volumes:
      - ./models:/models          # rw: HF cache (vision + text snapshots)
    ports:
      - "8101:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - gpu-network
    mem_limit: 4096m
    memswap_limit: 6144m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-f417c539-26db-94e9-4c8f-c5a775291988']
              capabilities: [gpu]

  # =============================================================================
  # SHELVED — multimodal-embed (nomic-embed-multimodal-3b / BiQwen2.5, document
  # retrieval). Superseded on GPU 7 by vision-embed above for the natural-photo
  # use case. Service code kept in ./multimodal-embed and the
  # switch-to-nomic-multimodal-embed openspec change; to revive, restore its
  # service block from git history and assign it a free GPU UUID.

  # =============================================================================
  # IMAGE GENERATION SERVER (GPU 8)
  # Segmind SSD-1B via LocalAI
  # =============================================================================

  image-server:
    image: localai/localai:latest-gpu-nvidia-cuda-12
    container_name: pea-image-1
    restart: unless-stopped
    runtime: nvidia
    entrypoint: ["/config/entrypoint-wrapper.sh"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-c710b68a-493d-0d55-9b1a-f48d8ad71978
      - DEBUG=true
      - THREADS=2
      - MODELS_PATH=/models
      - IMAGE_PATH=/tmp/generated
      - SINGLE_ACTIVE_BACKEND=true
      - BACKENDS_PATH=/backends
    volumes:
      - ./models:/models
      - ./configs:/config:ro
      - image_cache:/tmp/generated
      - image_backends:/backends
    ports:
      - "5100:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    networks:
      - gpu-network
    mem_limit: 4096m
    memswap_limit: 6144m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-c710b68a-493d-0d55-9b1a-f48d8ad71978']
              capabilities: [gpu]

  # =============================================================================
  # MONITORING
  # =============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: pea-prometheus
    restart: unless-stopped
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9099:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - gpu-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: pea-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    network_mode: host

networks:
  gpu-network:
    driver: bridge

volumes:
  prometheus_data:
  image_cache:
  image_backends:
