# Prometheus configuration for HeartCode PEA GPU monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # GPU Chat Servers (6 instances, GPU 1-6; embeds co-located, image on GPU 7-8)
  - job_name: 'gpu-chat-servers'
    static_configs:
      - targets: ['pea-gpu-1:9091']
        labels:
          gpu_id: '1'
          model_type: 'sfw'
      - targets: ['pea-gpu-2:9091']
        labels:
          gpu_id: '2'
          model_type: 'sfw'
      - targets: ['pea-gpu-3:9091']
        labels:
          gpu_id: '3'
          model_type: 'sfw'
      - targets: ['pea-gpu-4:9091']
        labels:
          gpu_id: '4'
          model_type: 'nsfw'
      - targets: ['pea-gpu-5:9091']
        labels:
          gpu_id: '5'
          model_type: 'nsfw'
      - targets: ['pea-gpu-6:9091']
        labels:
          gpu_id: '6'
          model_type: 'nsfw'

  # Vision Embedding Servers (nomic-embed-vision-v1.5 + text-v1.5), co-located on SFW chat GPU 1-3
  - job_name: 'vision-embed'
    static_configs:
      - targets: ['pea-embed-vision-1:9091']
        labels:
          gpu_id: '1'
          model_type: 'embed-vision'
      - targets: ['pea-embed-vision-2:9091']
        labels:
          gpu_id: '2'
          model_type: 'embed-vision'
      - targets: ['pea-embed-vision-3:9091']
        labels:
          gpu_id: '3'
          model_type: 'embed-vision'

  # Image Servers (LocalAI metrics, GPU 7-8, load-balanced)
  - job_name: 'image-server'
    static_configs:
      - targets: ['pea-image-1:8080']
        labels:
          gpu_id: '8'
          model_type: 'image'
      - targets: ['pea-image-2:8080']
        labels:
          gpu_id: '7'
          model_type: 'image'
    metrics_path: '/metrics'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for CPU/system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.0.144:9100']
        labels:
          instance: 'pea'
