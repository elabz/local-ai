# Local AI - LiteLLM Proxy Configuration
#
# Load-balancing proxy for GPU inference servers.
# Uses PostgreSQL-backed API key management (native LiteLLM).
#
# GPU Servers (PEA - 192.168.0.144):
#   SFW:    GPU 1-3, ports 8080-8082 (Stheno v3.4 Q5_K_M)
#   NSFW:   GPU 4-6, ports 8083-8085 (Lumimaid v0.2 8B Q5_K_M)
#   Vision: GPU 1-2, ports 8101-8102 (nomic-embed-vision-v1.5 + text-v1.5, 768-d, text+image)
#   Text:   GPU 4-5, ports 8093-8094 (nomic-embed-text-v1.5, 768-d, text-only)
#   Visual: GPU 3,6, ports 8104-8105 (DINOv2 ViT-L/14, 1024-d, image-only)
#   Image:  GPU 7-8, ports 5101/5100 (Segmind SSD-1B via LocalAI, 2x load-balanced)

model_list:
  # =============================================================================
  # SFW MODELS - 3x GPU load balancing (GPU 1-3)
  # Public API names: heartcode-default, heartcode-sfw
  # Internal name: heartcode-chat-sfw
  # =============================================================================

  - model_name: "heartcode-chat-sfw"
    litellm_params:
      model: "openai/Llama-3.1-8B-Stheno-v3.4-Q5_K_M.gguf"
      api_base: "http://192.168.0.144:8080/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu1"
      mode: "chat"

  - model_name: "heartcode-chat-sfw"
    litellm_params:
      model: "openai/Llama-3.1-8B-Stheno-v3.4-Q5_K_M.gguf"
      api_base: "http://192.168.0.144:8081/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu2"
      mode: "chat"

  - model_name: "heartcode-chat-sfw"
    litellm_params:
      model: "openai/Llama-3.1-8B-Stheno-v3.4-Q5_K_M.gguf"
      api_base: "http://192.168.0.144:8082/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu3"
      mode: "chat"

  # =============================================================================
  # NSFW MODELS - 3x GPU load balancing (GPU 4-6)
  # Public API name: heartcode-nsfw
  # Internal name: heartcode-chat-nsfw
  # =============================================================================

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8083/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu4"
      mode: "chat"

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8084/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu5"
      mode: "chat"

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8085/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu6"
      mode: "chat"

  # =============================================================================
  # TEXT EMBEDDING MODEL - nomic-embed-text-v1.5 (768-d), 3 backends (GPU 4-6)
  # Co-located with NSFW chat (GPU 4-6, :8093-8095). The 3 vision-embed servers
  # are co-located with SFW chat (GPU 1-3) under heartcode-embed-vision below.
  # openspec: rebalance-embed-image-gpus.
  # =============================================================================

  - model_name: "heartcode-embed"
    litellm_params:
      model: "openai/nomic-embed-text-v1.5.Q8_0.gguf"
      api_base: "http://192.168.0.144:8093/v1"
      api_key: "sk-local"
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed1"
      mode: "embedding"

  - model_name: "heartcode-embed"
    litellm_params:
      model: "openai/nomic-embed-text-v1.5.Q8_0.gguf"
      api_base: "http://192.168.0.144:8094/v1"
      api_key: "sk-local"
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed2"
      mode: "embedding"


  # =============================================================================
  # VISION EMBEDDING MODEL - nomic-embed-vision-v1.5 + nomic-embed-text-v1.5
  # Natural-photo text + image embeddings, shared 768-d space. 3 backends
  # co-located with SFW chat (GPU 1-3, :8101-8103).
  # openspec: serve-photo-embeddings + rebalance-embed-image-gpus.
  # =============================================================================

  - model_name: "heartcode-embed-vision"
    litellm_params:
      model: "openai/heartcode-embed-vision"
      api_base: "http://192.168.0.144:8101/v1"
      api_key: "sk-local"
      timeout: 60
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed-vision1"
      mode: "embedding"

  - model_name: "heartcode-embed-vision"
    litellm_params:
      model: "openai/heartcode-embed-vision"
      api_base: "http://192.168.0.144:8102/v1"
      api_key: "sk-local"
      timeout: 60
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed-vision2"
      mode: "embedding"

  # =============================================================================
  # VISUAL EMBEDDING MODEL - DINOv2 ViT-L/14 (with registers), 1024-d
  # IMAGE-ONLY visual / same-object similarity (image→image). Separate vector
  # space from heartcode-embed-vision — downstream keeps its own index.
  # 2 backends co-located with chat on GPU 3 + GPU 6 (:8104-8105).
  # openspec: serve-dinov2-visual-embed.
  # =============================================================================

  - model_name: "heartcode-embed-visual"
    litellm_params:
      model: "openai/heartcode-embed-visual"
      api_base: "http://192.168.0.144:8104/v1"
      api_key: "sk-local"
      timeout: 60
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed-visual1"
      mode: "embedding"

  - model_name: "heartcode-embed-visual"
    litellm_params:
      model: "openai/heartcode-embed-visual"
      api_base: "http://192.168.0.144:8105/v1"
      api_key: "sk-local"
      timeout: 60
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed-visual2"
      mode: "embedding"

  # =============================================================================
  # IMAGE MODEL - Segmind SSD-1B via LocalAI, 2x load-balanced (GPU 7 + GPU 8)
  # openspec: rebalance-embed-image-gpus.
  # =============================================================================

  - model_name: "heartcode-image"
    litellm_params:
      model: "openai/heartcode-image"
      api_base: "http://192.168.0.144:5100/v1"
      api_key: "sk-local"
    model_info:
      id: "heartcode-image1"
      mode: "image_generation"

  - model_name: "heartcode-image"
    litellm_params:
      model: "openai/heartcode-image"
      api_base: "http://192.168.0.144:5101/v1"
      api_key: "sk-local"
    model_info:
      id: "heartcode-image2"
      mode: "image_generation"

# Router settings for load balancing
router_settings:
  routing_strategy: "least-busy"
  num_retries: 2
  retry_after: 3
  timeout: 90
  allowed_fails: 2
  cooldown_time: 60

  # Health check settings
  enable_health_check: true

  # Rate limiting per deployment to prevent GPU overload
  model_rate_limits:
    - model_name: "heartcode-chat-sfw"
      tpm: 50000
      rpm: 35
    - model_name: "heartcode-chat-nsfw"  # now 3 GPUs (GPU 4-6), was 4
      tpm: 38000
      rpm: 34
    - model_name: "heartcode-embed"      # 2 text-embed backends (GPU 4-5)
      tpm: 28000
      rpm: 28
    - model_name: "heartcode-embed-vision"  # 2 backends co-located on SFW chat (GPU 1-2)
      tpm: 30000
      rpm: 40
    - model_name: "heartcode-embed-visual"  # 2 DINOv2 backends (GPU 3 + 6), image-only
      tpm: 30000
      rpm: 40

  # Model aliases - map public API names to internal model names
  model_group_alias:
    "heartcode-default": "heartcode-chat-sfw"
    "heartcode-sfw": "heartcode-chat-sfw"
    "heartcode-nsfw": "heartcode-chat-nsfw"
    "heartcode-chat": "heartcode-chat-sfw"

# General settings - PostgreSQL-backed API key management
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  # Concurrency limits
  # 6 chat GPUs * 2 concurrent each = 12, + 1 multimodal embed = 13 max safe
  max_parallel_requests: 7
  global_max_parallel_requests: 13

  # Request timeout
  request_timeout: 90

  # Logging
  json_logs: true

  # CORS
  allow_credentials: true

  # Health check interval (seconds)
  health_check_interval: 15

# LiteLLM settings
litellm_settings:
  set_verbose: false
  drop_params: true  # Drop unsupported params instead of erroring

# Environment variables needed:
#   LITELLM_MASTER_KEY - Master key for admin API access
#   DATABASE_URL - PostgreSQL connection string (set in docker-compose)
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST - Optional observability
