# Local AI - LiteLLM Proxy Configuration
#
# Load-balancing proxy for GPU inference servers.
# Uses PostgreSQL-backed API key management (native LiteLLM).
#
# GPU Servers (PEA - 192.168.0.144):
#   SFW:   GPU 1-3, ports 8080-8082 (Stheno v3.4 Q5_K_M)
#   NSFW:  GPU 4-6, ports 8083-8085 (Lumimaid v0.2 8B Q5_K_M)
#   Embed: GPU 7,   port 8100 (nomic-embed-multimodal-3b — text + image, 3584-d)
#   Image: GPU 8,   port 5100 (Segmind SSD-1B via LocalAI)

model_list:
  # =============================================================================
  # SFW MODELS - 3x GPU load balancing (GPU 1-3)
  # Public API names: heartcode-default, heartcode-sfw
  # Internal name: heartcode-chat-sfw
  # =============================================================================

  - model_name: "heartcode-chat-sfw"
    litellm_params:
      model: "openai/Llama-3.1-8B-Stheno-v3.4-Q5_K_M.gguf"
      api_base: "http://192.168.0.144:8080/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu1"
      mode: "chat"

  - model_name: "heartcode-chat-sfw"
    litellm_params:
      model: "openai/Llama-3.1-8B-Stheno-v3.4-Q5_K_M.gguf"
      api_base: "http://192.168.0.144:8081/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu2"
      mode: "chat"

  - model_name: "heartcode-chat-sfw"
    litellm_params:
      model: "openai/Llama-3.1-8B-Stheno-v3.4-Q5_K_M.gguf"
      api_base: "http://192.168.0.144:8082/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu3"
      mode: "chat"

  # =============================================================================
  # NSFW MODELS - 4x GPU load balancing (GPU 4-7)
  # Public API name: heartcode-nsfw
  # Internal name: heartcode-chat-nsfw
  # =============================================================================

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8083/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu4"
      mode: "chat"

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8084/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu5"
      mode: "chat"

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8085/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu6"
      mode: "chat"

  - model_name: "heartcode-chat-nsfw"
    litellm_params:
      model: "openai/Lumimaid-v0.2-8B-Q5_K_M-imat.gguf"
      api_base: "http://192.168.0.144:8086/v1"
      api_key: "sk-local"
      max_tokens: 512
      temperature: 0.8
    model_info:
      id: "heartcode-gpu7"
      mode: "chat"

  # =============================================================================
  # EMBEDDING MODEL - multimodal, 1x dedicated GPU (GPU 7, port 8100)
  # nomic-embed-multimodal-3b (BiQwen2.5) — text + image, 3584-d shared space.
  # Replaces the old 7x nomic-embed-text-v1.5 deployments (ports 8090-8096).
  # Heavier/lower-throughput: 1 GPU, serialized inference, higher latency.
  #
  # ROLLBACK: `git checkout HEAD~1 -- litellm/config.yaml` restores the 7
  # text-embed deployments. Their containers (embed-1..6, ports 8090-8095)
  # remain up until decommission (change task 7.2).
  # =============================================================================

  - model_name: "heartcode-embed"
    litellm_params:
      model: "openai/nomic-embed-multimodal-3b"
      api_base: "http://192.168.0.144:8100/v1"
      api_key: "sk-local"
      timeout: 120          # Pascal multimodal embeds are slow (esp. images)
      extra_body:
        encoding_format: "float"
    model_info:
      id: "heartcode-embed-mm"
      mode: "embedding"

  # =============================================================================
  # PLANNED — heartcode-embed-vision (openspec change: add-image-semantic-search)
  # nomic-embed-vision-v1.5 (images) + nomic-embed-text-v1.5 (text), shared 768-d
  # space, for natural-photo text→image / image→image search via the image-search
  # service. NOT YET DEPLOYED — endpoint/port + GPU finalized in change tasks
  # 2.1/2.2 (replace vs coexist with heartcode-embed on GPU 7). Uncomment and set
  # api_base once the model serves an OpenAI /v1/embeddings endpoint.
  # =============================================================================
  # - model_name: "heartcode-embed-vision"
  #   litellm_params:
  #     model: "openai/nomic-embed-vision-v1.5"
  #     api_base: "http://192.168.0.144:8101/v1"   # placeholder port — finalize on deploy
  #     api_key: "sk-local"
  #     timeout: 60
  #     extra_body:
  #       encoding_format: "float"
  #   model_info:
  #     id: "heartcode-embed-vision"
  #     mode: "embedding"

  # =============================================================================
  # IMAGE MODEL - GPU 8 (Segmind SSD-1B via LocalAI)
  # =============================================================================

  - model_name: "heartcode-image"
    litellm_params:
      model: "openai/heartcode-image"
      api_base: "http://192.168.0.144:5100/v1"
      api_key: "sk-local"
    model_info:
      id: "heartcode-image"
      mode: "image_generation"

# Router settings for load balancing
router_settings:
  routing_strategy: "least-busy"
  num_retries: 2
  retry_after: 3
  timeout: 90
  allowed_fails: 2
  cooldown_time: 60

  # Health check settings
  enable_health_check: true

  # Rate limiting per deployment to prevent GPU overload
  model_rate_limits:
    - model_name: "heartcode-chat-sfw"
      tpm: 50000
      rpm: 35
    - model_name: "heartcode-chat-nsfw"  # now 3 GPUs (GPU 4-6), was 4
      tpm: 38000
      rpm: 34
    - model_name: "heartcode-embed"      # 1 dedicated GPU, heavy multimodal
      tpm: 20000
      rpm: 20

  # Model aliases - map public API names to internal model names
  model_group_alias:
    "heartcode-default": "heartcode-chat-sfw"
    "heartcode-sfw": "heartcode-chat-sfw"
    "heartcode-nsfw": "heartcode-chat-nsfw"
    "heartcode-chat": "heartcode-chat-sfw"

# General settings - PostgreSQL-backed API key management
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  # Concurrency limits
  # 6 chat GPUs * 2 concurrent each = 12, + 1 multimodal embed = 13 max safe
  max_parallel_requests: 7
  global_max_parallel_requests: 13

  # Request timeout
  request_timeout: 90

  # Logging
  json_logs: true

  # CORS
  allow_credentials: true

  # Health check interval (seconds)
  health_check_interval: 15

# LiteLLM settings
litellm_settings:
  set_verbose: false
  drop_params: true  # Drop unsupported params instead of erroring

# Environment variables needed:
#   LITELLM_MASTER_KEY - Master key for admin API access
#   DATABASE_URL - PostgreSQL connection string (set in docker-compose)
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST - Optional observability
