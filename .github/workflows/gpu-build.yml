# CI for the local-ai monorepo.
#
# Runs entirely on GitHub-hosted runners with no secrets and no LAN access:
#   - compose-validate : `docker compose config` for every stack
#   - litellm-validate  : structural checks on the LiteLLM config(s)
#   - python-lint       : ruff (real errors) + py_compile for the FastAPI services
#   - gpu-build         : build-only check of the llama.cpp image (path-filtered)
#
# Deploys to the private-LAN hosts (PEA/Prod) live in deploy.yml, which runs on a
# self-hosted runner — GitHub-hosted runners cannot reach 192.168.0.x.

name: GPU Server Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Run actions on Node 24 (clears the "Node.js 20 actions are deprecated" warning)
# regardless of each action's pinned default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gpu_image: ${{ steps.filter.outputs.gpu_image }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gpu_image:
              - 'gpu-server/Dockerfile'
              - 'gpu-server/requirements.txt'
              - 'gpu-server/*.py'

  compose-validate:
    name: Validate Compose stacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: docker compose config
        run: |
          set -euo pipefail
          fail=0
          for stack in gpu-server litellm monitoring langfuse; do
            f="$stack/docker-compose.yml"
            [ -f "$f" ] || { echo "skip $stack (no compose file)"; continue; }
            # Satisfy any env_file: targets so interpolation can run.
            while read -r p; do [ -n "$p" ] && touch "$stack/$p"; done < <(
              awk '/env_file:/{ef=1;next} ef&&/^[[:space:]]*-/{gsub(/[[:space:]-]/,"");print;next} ef{ef=0}' "$f"
            )
            # Provide dummy values for hard-required (${VAR:?}/${VAR?}) variables.
            reqs=$(grep -hoE '\$\{[A-Z0-9_]+:?\?' "$f" | sed -E 's/\$\{([A-Z0-9_]+).*/\1/' | sort -u || true)
            for v in $reqs; do export "$v=ci-dummy"; done
            echo "::group::$stack"
            docker compose -f "$f" config -q && echo "OK: $stack" || { echo "FAIL: $stack"; fail=1; }
            echo "::endgroup::"
          done
          exit $fail

  litellm-validate:
    name: Validate LiteLLM config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python litellm/validate_config.py

  model-manifest-validate:
    name: Validate model manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Schema + drift check (models.yaml -> generated files)
        run: python gpu-server/scripts/render-config.py --check

  python-lint:
    name: Lint Python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff (real errors — fails build)
        run: ruff check --select E9,F63,F7,F82 --output-format=github gpu-server
      - name: ruff (style — advisory)
        continue-on-error: true
        run: ruff check --output-format=github gpu-server
      - name: py_compile
        run: |
          python -m py_compile gpu-server/*.py
          python -m py_compile gpu-server/vision-embed/*.py
          python -m py_compile gpu-server/dino-embed/*.py

  gpu-build:
    name: Build GPU Server Image (build-only)
    needs: changes
    if: needs.changes.outputs.gpu_image == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./gpu-server
          file: ./gpu-server/Dockerfile
          push: false
          tags: local-ai-llama:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CUDA_VERSION=11.8.0
